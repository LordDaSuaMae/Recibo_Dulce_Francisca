<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptum - Emissor de Recibos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --bg: #f0f2f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }
        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        h2 { font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        .form-section { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; background: #fff; }
        .form-group { margin-bottom: 15px; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input[type="text"], input[type="date"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        
        .radio-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 8px;
        }
        .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 500; }
        
        button {
            width: 100%;
            padding: 16px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2);
            transition: transform 0.1s, background-color 0.2s;
        }
        button:hover { background-color: #219150; }
        button:active { transform: scale(0.98); }
        
        /* Controle de abas */
        .tipo-form { display: none; }
        .active-form { display: block; }

        /* --- ESTILO DO RECIBO (O que vira PDF) --- */
        #receptum-template {
            display: none; 
            width: 1080px; 
            padding: 20px;
            background: white;
            color: black;
            box-sizing: border-box;
        }
        .receptum-border {
            border: 4px solid black; 
            padding: 40px;
            position: relative;
        }
        .receptum-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid black;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .receptum-header img {
            height: 100px; 
            width: auto;
        }
        .receptum-title {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            text-align: right;
        }
        .receptum-body {
            min-height: 180px;
        }
        .receptum-body p {
            font-size: 22px; 
            line-height: 1.8;
            margin: 0 0 20px 0;
        }
        
        /* Apenas negrito, sem sublinhado para evitar o bug dos traços */
        .receptum-bold { font-weight: bold; } 
        
        .receptum-total {
            font-size: 28px;
            font-weight: bold;
            text-align: right;
            margin-top: 20px;
            padding: 10px;
            border-top: 2px solid #eee;
        }
        .receptum-footer {
            margin-top: 50px;
        }
        .receptum-location-date {
            text-align: right;
            font-size: 20px;
            margin-bottom: 50px;
            font-style: italic;
        }
        .receptum-signatures {
            display: flex;
            justify-content: space-between;
            gap: 100px;
        }
        .signature-line {
            flex: 1;
            text-align: center;
            border-top: 2px solid black;
            padding-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Receptum - Gerador Horizontal</h1>
        
        <div class="radio-group">
            <label class="radio-item">
                <input type="radio" name="tipo_recibo" value="1" onchange="toggleForm()" checked> 
                Recibo de Condomínio
            </label>
            <label class="radio-item">
                <input type="radio" name="tipo_recibo" value="2" onchange="toggleForm()"> 
                Pagamento a Terceiro
            </label>
        </div>

        <div class="form-section">
            <div class="form-group">
                <label>Nome do Condomínio:</label>
                <input type="text" id="nomeCondominio" placeholder="Ex: Residencial Dulce Francisca" value="Residencial Dulce Francisca">
            </div>

            <div id="form-tipo-1" class="tipo-form active-form">
                <h2>Dados do Condômino</h2>
                <div class="form-group">
                    <label>Nome do Condômino:</label>
                    <input type="text" id="nome1" placeholder="Ex: João da Silva">
                </div>
            </div>

            <div id="form-tipo-2" class="tipo-form">
                <h2>Dados do Prestador/Terceiro</h2>
                <div class="form-group">
                    <label>Nome do Recebedor:</label>
                    <input type="text" id="nome2" placeholder="Ex: Empresa de Limpeza">
                </div>
                <div class="form-group">
                    <label>CPF/CNPJ:</label>
                    <input type="text" id="cpf2" placeholder="000.000.000-00">
                </div>
                <div class="form-group">
                    <label>Referente a:</label>
                    <input type="text" id="referente2" placeholder="Ex: Limpeza da caixa d'água">
                </div>
                <div class="form-group">
                    <label>Tipo de Serviço:</label>
                    <input type="text" id="servico2" placeholder="Ex: Manutenção">
                </div>
            </div>

            <div class="form-group">
                <label>Data do Pagamento:</label>
                <input type="date" id="dataPagamento">
            </div>
            <div class="form-group">
                <label>Valor (R$):</label>
                <input type="number" id="valorTotal" step="0.01" placeholder="0.00">
            </div>
        </div>

        <button onclick="gerarPDF()">Gerar Recibo (Horizontal)</button>
    </div>

    <div id="receptum-template">
        <div class="receptum-border">
            <div class="receptum-header">
                <img src="./Dulce_francisca.png" alt="Logo">
                <div class="receptum-title" id="pdf-title">RECIBO</div>
            </div>
            
            <div class="receptum-body" id="pdf-content"></div>

            <div class="receptum-total" id="pdf-total-display"></div>

            <div class="receptum-footer">
                <div class="receptum-location-date" id="pdf-location-date"></div>
                <div class="receptum-signatures">
                    <div class="signature-line" id="pdf-sig-1">Assinatura</div>
                    <div class="signature-line" id="pdf-sig-2">Responsável</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleForm() {
            const tipo = document.querySelector('input[name="tipo_recibo"]:checked').value;
            document.getElementById('form-tipo-1').classList.toggle('active-form', tipo === "1");
            document.getElementById('form-tipo-2').classList.toggle('active-form', tipo === "2");
        }

        function formatCurrency(value) {
            return Number(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function formatDate(dateString) {
            if (!dateString) return "";
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}/${year}`;
        }

        function gerarPDF() {
            const tipo = document.querySelector('input[name="tipo_recibo"]:checked').value;
            const condominio = document.getElementById('nomeCondominio').value;
            const dataPag = formatDate(document.getElementById('dataPagamento').value);
            const valor = formatCurrency(document.getElementById('valorTotal').value);

            if (!document.getElementById('valorTotal').value || !dataPag) {
                alert("Preencha a data e o valor!");
                return;
            }

            let html = "";
            if (tipo === "1") {
                const nome = document.getElementById('nome1').value;
                document.getElementById('pdf-title').innerText = "RECIBO DE CONDOMÍNIO";
                html = `<p>Recebemos de <span class="receptum-bold">${nome}</span> a quantia de <span class="receptum-bold">${valor}</span> referente ao pagamento da taxa de condomínio do <span class="receptum-bold">${condominio}</span>.</p>
                        <p>Data do pagamento: <span class="receptum-bold">${dataPag}</span></p>`;
                
                // Assinaturas para o Tipo 1
                document.getElementById('pdf-sig-1').innerText = "Assinatura do Condômino";
                document.getElementById('pdf-sig-2').innerText = "Responsável";
            } else {
                const nome = document.getElementById('nome2').value;
                const cpf = document.getElementById('cpf2').value;
                const ref = document.getElementById('referente2').value;
                const serv = document.getElementById('servico2').value;
                document.getElementById('pdf-title').innerText = "RECIBO DE PAGAMENTO";
                html = `<p>O <span class="receptum-bold">${condominio}</span> efetuou o pagamento no valor de <span class="receptum-bold">${valor}</span> a <span class="receptum-bold">${nome}</span> (CPF/CNPJ: ${cpf}).</p>
                        <p>Referente a: <span class="receptum-bold">${ref}</span> (${serv}).</p>
                        <p>Data do pagamento: <span class="receptum-bold">${dataPag}</span></p>`;
                
                // Assinaturas para o Tipo 2
                document.getElementById('pdf-sig-1').innerText = "Assinatura do Recebedor";
                document.getElementById('pdf-sig-2').innerText = "Responsável";
            }

            document.getElementById('pdf-content').innerHTML = html;
            document.getElementById('pdf-total-display').innerHTML = `VALOR TOTAL: <span class="receptum-bold">${valor}</span>`;
            
            const hoje = new Date();
            document.getElementById('pdf-location-date').innerText = `Itabuna, Bahia - ${hoje.toLocaleDateString('pt-BR')}`;

            const element = document.getElementById('receptum-template');
            element.style.display = 'block';

            const opt = {
                margin: 5,
                filename: `recibo_${Date.now()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, logging: false, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.style.display = 'none';
            });
        }
    </script>
</body>
</html>
